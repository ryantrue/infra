apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  namespace: nextcloud
  labels:
    app.kubernetes.io/name: nextcloud
    app.kubernetes.io/part-of: nextcloud
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: nextcloud
  template:
    metadata:
      labels:
        app: nextcloud
        app.kubernetes.io/name: nextcloud
        app.kubernetes.io/part-of: nextcloud
    spec:
      containers:
        - name: nextcloud
          image: nextcloud:stable-apache
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: nextcloud-secrets
          env:
            - name: POSTGRES_HOST
              value: nextcloud-postgres
            - name: NEXTCLOUD_TRUSTED_DOMAINS
              value: cloud.ryandev.ru
            - name: OVERWRITEHOST
              value: cloud.ryandev.ru
            - name: OVERWRITEPROTOCOL
              value: https
          ports:
            - name: http
              containerPort: 80
          startupProbe:
            httpGet:
              path: /status.php
              port: http
              httpHeaders:
                - name: Host
                  value: cloud.ryandev.ru
            failureThreshold: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /status.php
              port: http
              httpHeaders:
                - name: Host
                  value: cloud.ryandev.ru
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /status.php
              port: http
              httpHeaders:
                - name: Host
                  value: cloud.ryandev.ru
            initialDelaySeconds: 300
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              memory: 3Gi
          volumeMounts:
            - name: data
              mountPath: /var/www/html
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nextcloud-data
