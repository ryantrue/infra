apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ryandev-ru-wildcard
  namespace: kube-system
  labels:
    app.kubernetes.io/name: ryandev-ru-wildcard
    app.kubernetes.io/part-of: infra
spec:
  secretName: ryandev-ru-wildcard-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - ryandev.ru
    - "*.ryandev.ru"
  privateKey:
    rotationPolicy: Always
