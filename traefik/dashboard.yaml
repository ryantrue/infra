apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: kube-system
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.ryantrue.ru`) && (PathPrefix(`/dashboard`) || PathPrefix(`/api`))
      kind: Rule
      middlewares:
        - name: basic-auth
      services:
        - name: api@internal
          kind: TraefikService
  tls:
    secretName: ryantrue-ru-wildcard-tls
