apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: collabora
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/ryantrue/infra.git
    targetRevision: main
    path: apps/collabora
  destination:
    server: https://kubernetes.default.svc
    namespace: collabora
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
