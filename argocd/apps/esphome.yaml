apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: esphome
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/ryantrue/infra.git
    targetRevision: main
    path: apps/esphome

  destination:
    server: https://kubernetes.default.svc
    namespace: esphome

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
