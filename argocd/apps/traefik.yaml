apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-infra
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:ryantrue/infra.git
    targetRevision: main
    path: traefik
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
